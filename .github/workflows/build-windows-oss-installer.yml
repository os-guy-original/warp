name: Build Windows OSS installer

on:
  push:
    branches:
      - feature/openai-compatible-endpoints
      - codex/**
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag/version to embed in the installer
        required: false
        default: custom-ci

jobs:
  build:
    name: Windows x64 OSS installer
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cargo release dependencies
        shell: pwsh
        run: |
          cargo install --locked cargo-about@0.8.4

      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          choco install innosetup protoc -y --no-progress
          "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Cache cargo output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-oss-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-oss-${{ runner.os }}-

      - name: Build installer
        id: build_installer
        shell: pwsh
        env:
          GIT_RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          ./script/windows/bundle.ps1 -CHANNEL oss -ARCH x64
          $installer = Join-Path $pwd "script/windows/Output/WarpOssSetup.exe"
          if (!(Test-Path $installer)) {
            throw "Installer not found: $installer"
          }
          "installer_path=$($installer -replace '\\','/')" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarpOssSetup-windows-x64
          path: ${{ steps.build_installer.outputs.installer_path }}
          if-no-files-found: error
